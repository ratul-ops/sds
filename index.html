<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I am a Robot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="robot-box">
    <h2>Robot Verification</h2>
    <label class="robot-check">
      <input type="checkbox" id="robot">
      <span>I am a Robot 🤖</span>
    </label>
    <button id="verifyBtn">Verify</button>
    <p id="message"></p>

    <video id="camera" autoplay playsinline width="300"></video>
    <canvas id="snapshot" width="300" height="200"></canvas>
    <p id="resultText"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
